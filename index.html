<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Video Giải Đề - Giáo Dục Tâm Đức</title>
    
    <!-- Cài đặt Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Cài đặt React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Cài đặt Babel để biên dịch JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#F8FAFC] text-slate-800 font-sans pb-24 selection:bg-purple-200 selection:text-purple-900">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useMemo } = React;

        // =====================================================================
        // ⚙️ KHU VỰC CẤU HÌNH GOOGLE SHEETS (BẠN ĐIỀN LINK VÀO ĐÂY)
        // =====================================================================
        
        // 1. Link File Google Sheets của bạn (Copy từ thanh địa chỉ trình duyệt)
        // Dùng để khi bấm nút "Cập nhật dữ liệu", nó sẽ mở file Excel ra cho bạn sửa.
        const GOOGLE_SHEET_EDIT_URL = "https://www.facebook.com/gdtamduc"; 

        // 2. Link CSV (Lấy từ menu: Tệp -> Chia sẻ -> Công bố lên web -> Chọn định dạng CSV)
        // Trang web sẽ tự động lấy dữ liệu từ link này.
        const PUBLISHED_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSqV0mcwrgYRK21oOvfF7XIEaHQknPVJyjqQZ4EAINfdGgb6ImSdVHcG-PlyrRN61iywJn96FX_vScU/pub?output=csv"; 

        // =====================================================================

        // --- BỘ ICON SVG CHUẨN ---
        const IconGraduationCap = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>;
        const IconLayers = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>;
        const IconSearch = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
        const IconVideo = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2" ry="2"/></svg>;
        const IconCheckCircle = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
        const IconX = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
        const IconPlay = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
        const IconMaximize = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>;
        const IconMinimize = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/></svg>;
        const IconExternalLink = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>;
        const IconFileSpreadsheet = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h2"/><path d="M8 17h2"/><path d="M14 13h2"/><path d="M14 17h2"/></svg>;

        // --- HELPER TRÍCH XUẤT YOUTUBE ID ---
        const getYouTubeId = (url) => {
            if (!url) return null;
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        };

        // --- HELPER LOẠI BỎ DẤU TIẾNG VIỆT ĐỂ TÌM KIẾM ---
        const removeAccents = (str) => {
            return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/đ/g, "d").replace(/Đ/g, "D");
        };

        // --- HELPER ĐỌC FILE CSV CHUẨN ---
        function parseCSV(str) {
            const arr = [];
            let quote = false;
            let col, c;
            for (let row = col = c = 0; c < str.length; c++) {
                let cc = str[c], nc = str[c+1];
                arr[row] = arr[row] || [];
                arr[row][col] = arr[row][col] || '';
                if (cc == '"' && quote && nc == '"') { arr[row][col] += cc; ++c; continue; }
                if (cc == '"') { quote = !quote; continue; }
                if (cc == ',' && !quote) { ++col; continue; }
                if (cc == '\r' && nc == '\n' && !quote) { ++row; col = 0; ++c; continue; }
                if (cc == '\n' && !quote) { ++row; col = 0; continue; }
                if (cc == '\r' && !quote) { ++row; col = 0; continue; }
                arr[row][col] += cc;
            }
            return arr;
        }

        function App() {
            const [exams, setExams] = useState([]);
            const [loading, setLoading] = useState(true);
            const [errorMsg, setErrorMsg] = useState("");
            
            // States cho UI
            const [filter, setFilter] = useState('ALL');
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedExam, setSelectedExam] = useState(null);

            // Fetch Dữ liệu từ Google Sheets CSV
            useEffect(() => {
                const loadExamsFromSheet = async () => {
                    // 1. Tạo sẵn 26 đề rỗng làm khung giao diện
                    let baseExams = [];
                    for (let i = 1; i <= 26; i++) {
                        baseExams.push({
                            id: `exam_${i}`,
                            title: `Đề thi số ${i}`,
                            type: i <= 10 ? 'GK2' : 'CK2', // 1-10 GK2, 11-26 CK2
                            order: i,
                            videos: [
                                { part: 'Phần 1', title: 'Trắc nghiệm', url: '' },
                                { part: 'Phần 2', title: 'Đúng sai', url: '' },
                                { part: 'Phần 3', title: 'Trả lời ngắn', url: '' }
                            ]
                        });
                    }

                    // 2. Tải và đắp dữ liệu từ CSV vào
                    if (PUBLISHED_CSV_URL && PUBLISHED_CSV_URL.startsWith('http')) {
                        try {
                            const response = await fetch(PUBLISHED_CSV_URL);
                            if (!response.ok) throw new Error("Không thể tải file CSV. Vui lòng kiểm tra lại link.");
                            
                            const csvText = await response.text();
                            const rows = parseCSV(csvText);

                            // Bỏ qua dòng tiêu đề (index 0)
                            for (let i = 1; i < rows.length; i++) {
                                const cols = rows[i];
                                if (cols.length >= 4) { // Cần ít nhất 4 cột: MaDe, Video1, Video2, Video3
                                    const maDe = parseInt(cols[0].trim());
                                    const url1 = cols[1]?.trim() || '';
                                    const url2 = cols[2]?.trim() || '';
                                    const url3 = cols[3]?.trim() || '';
                                    
                                    // Tìm đề thi tương ứng trong baseExams và cập nhật URL
                                    if (!isNaN(maDe)) {
                                        const examIndex = baseExams.findIndex(e => e.order === maDe);
                                        if (examIndex !== -1) {
                                            baseExams[examIndex].videos[0].url = url1;
                                            baseExams[examIndex].videos[1].url = url2;
                                            baseExams[examIndex].videos[2].url = url3;
                                        }
                                    }
                                }
                            }
                        } catch (error) {
                            console.error("Lỗi Google Sheets:", error);
                            setErrorMsg("Không thể đọc dữ liệu từ Google Sheets. Có thể do link CSV chưa chính xác hoặc chưa được Công bố.");
                        }
                    }
                    
                    setExams(baseExams);
                    setLoading(false);
                };

                loadExamsFromSheet();
            }, []);

            // Lọc & Tìm kiếm thông minh
            const filteredExams = useMemo(() => {
                return exams.filter(exam => {
                    // Lọc theo tabs GK2/CK2
                    const matchType = filter === 'ALL' || exam.type === filter;
                    
                    // Chuẩn hóa chuỗi tìm kiếm (xóa dấu tiếng Việt, in thường, xóa khoảng trắng thừa)
                    const normalizedSearch = removeAccents(searchQuery.toLowerCase().trim());
                    
                    // Tách chuỗi thành các từ khóa (vd: "đề 1" -> ["de", "1"])
                    const searchTerms = normalizedSearch.split(/\s+/).filter(Boolean);
                    
                    if (searchTerms.length === 0) return matchType;

                    const normalizedTitle = removeAccents(exam.title.toLowerCase());
                    
                    // Kiểm tra: TẤT CẢ từ khóa phải có trong tiêu đề
                    const matchesAllTerms = searchTerms.every(term => {
                        // Nếu từ khóa là số (vd: "1"), dùng regex \b để tìm chính xác số đó, tránh tìm "1" ra "11"
                        if (!isNaN(term)) {
                            const regex = new RegExp(`\\b${term}\\b`);
                            return regex.test(normalizedTitle) || exam.order.toString() === term;
                        }
                        // Nếu là chữ, chỉ cần chứa từ đó là được
                        return normalizedTitle.includes(term);
                    });

                    return matchType && matchesAllTerms;
                });
            }, [exams, filter, searchQuery]);

            if (loading) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center font-sans">
                        <div className="w-12 h-12 border-4 border-purple-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                        <p className="text-slate-600 font-medium tracking-wide">Đang đồng bộ dữ liệu Google Sheets...</p>
                    </div>
                );
            }

            return (
                <div className="font-sans">
                {/* Header */}
                <header className="bg-white shadow-sm sticky top-0 z-30 border-b border-slate-100">
                    <div className="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
                    <div className="flex items-center">
                        <img 
                            src="LOGO_7.jpg" 
                            alt="Giáo Dục Tâm Đức" 
                            className="h-10 md:h-12 w-auto object-contain"
                            onError={(e) => {
                                e.target.onerror = null;
                                e.target.style.display = 'none';
                                e.target.nextSibling.style.display = 'flex';
                            }}
                        />
                        <div className="hidden items-center gap-2">
                            <div className="bg-gradient-to-br from-[#FF2E63] to-purple-600 p-2 rounded-xl">
                                <IconGraduationCap className="w-6 h-6 text-white" />
                            </div>
                            <div>
                                <h1 className="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-[#FF2E63] to-purple-600 uppercase tracking-tight">Tâm Đức</h1>
                            </div>
                        </div>
                    </div>
                    
                    {/* Nút Cập nhật dữ liệu (Mở link Google Sheet Excel) */}
                    <a
                        href={GOOGLE_SHEET_EDIT_URL || "#"}
                        target={GOOGLE_SHEET_EDIT_URL ? "_blank" : "_self"}
                        onClick={(e) => {
                            if(!GOOGLE_SHEET_EDIT_URL) {
                                e.preventDefault();
                                alert("Vui lòng thiết lập biến GOOGLE_SHEET_EDIT_URL trong code để sử dụng chức năng này.");
                            }
                        }}
                        className="flex items-center gap-2 px-5 py-2.5 rounded-full text-sm font-bold transition-all shadow-sm border bg-white text-slate-600 border-slate-200 hover:bg-purple-50 hover:text-purple-600 hover:border-purple-300"
                    >
                        <IconExternalLink className="w-4 h-4" /> <span className="hidden sm:inline">Cập nhật dữ liệu</span><span className="sm:hidden">Sửa</span>
                    </a>
                    </div>
                </header>

                {errorMsg && (
                    <div className="bg-rose-50 border-l-4 border-rose-500 p-4 mx-4 mt-6 max-w-6xl md:mx-auto rounded-r-lg">
                        <div className="flex items-center">
                            <div className="ml-3">
                                <p className="text-sm text-rose-700 font-bold">{errorMsg}</p>
                            </div>
                        </div>
                    </div>
                )}

                {/* Hero Section */}
                <div className="max-w-6xl mx-auto px-4 mt-8 mb-12">
                    <div className="bg-gradient-to-r from-[#FF2E63] via-[#E91E63] to-purple-600 text-white py-12 px-6 sm:px-10 rounded-[2rem] shadow-xl shadow-purple-500/20 relative overflow-hidden">
                    <div className="absolute top-0 right-0 w-80 h-80 bg-white opacity-[0.05] rounded-full blur-3xl -translate-y-1/2 translate-x-1/4"></div>
                    <div className="absolute bottom-0 left-0 w-60 h-60 bg-white opacity-[0.06] rounded-full blur-2xl translate-y-1/3 -translate-x-1/4"></div>
                    
                    <div className="relative z-10 w-full max-w-4xl">
                        <div className="flex flex-wrap items-center gap-3 mb-6">
                            <div className="bg-white/20 p-2.5 rounded-xl backdrop-blur-sm shadow-sm">
                                <IconLayers className="w-7 h-7 text-white" />
                            </div>
                            <h2 className="text-3xl md:text-4xl font-extrabold tracking-tight uppercase">
                                GIÁO DỤC TÂM ĐỨC
                            </h2>
                            <span className="bg-[#FFD700] text-purple-800 text-[11px] font-black px-2.5 py-0.5 rounded-full uppercase tracking-wider shadow-sm mt-1 sm:mt-0">
                                PRO
                            </span>
                        </div>
                        
                        <p className="text-pink-50 text-base md:text-[17px] mb-4 max-w-2xl font-medium leading-relaxed opacity-95">
                            Hệ thống tổng hợp video giải chi tiết 26 đề thi bám sát chương trình học. Bao gồm trắc nghiệm, đúng sai và trả lời ngắn.
                        </p>
                    </div>
                    </div>
                </div>

                {/* Main Content */}
                <main className="max-w-6xl mx-auto px-4 lg:px-6">
                    
                    {/* Thanh tìm kiếm - Thiết kế chuẩn UX/UI Responsive */}
                    <div className="max-w-2xl mx-auto mb-8 relative group px-2 sm:px-0">
                        <IconSearch className="absolute left-6 sm:left-7 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400 group-focus-within:text-purple-600 transition-colors z-10" />
                        <input 
                            type="text" 
                            placeholder="Tìm kiếm: gõ 'đề 1' hoặc '1'..." 
                            className="w-full bg-white border-2 border-slate-100 hover:border-purple-100 focus:border-purple-400 focus:ring-4 focus:ring-purple-50 rounded-full py-3.5 sm:py-4 pl-14 sm:pl-16 pr-6 outline-none transition-all shadow-[0_8px_30px_rgb(0,0,0,0.04)] text-slate-700 font-medium text-sm sm:text-base"
                            value={searchQuery}
                            onChange={(e) => setSearchQuery(e.target.value)}
                        />
                    </div>

                    {/* Tabs Filter - Thiết kế bo tròn dạng Pill */}
                    <div className="flex justify-center mb-12 px-2">
                        <div className="bg-white rounded-full shadow-sm border border-slate-200 p-1.5 flex flex-wrap justify-center gap-1 sm:gap-2">
                            {[
                            { id: 'ALL', label: 'Tất cả 26 Đề' },
                            { id: 'GK2', label: '10 Đề GK2' },
                            { id: 'CK2', label: '16 Đề CK2' }
                            ].map((f) => (
                            <button
                                key={f.id}
                                onClick={() => setFilter(f.id)}
                                className={`px-5 sm:px-8 py-2.5 rounded-full text-xs sm:text-sm font-bold transition-all duration-300 ${
                                filter === f.id 
                                    ? 'bg-gradient-to-r from-[#FF2E63] to-purple-600 text-white shadow-md' 
                                    : 'text-slate-500 hover:bg-slate-50 hover:text-slate-800'
                                }`}
                            >
                                {f.label}
                            </button>
                            ))}
                        </div>
                    </div>

                    {/* Exam Cards Grid */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-x-6 gap-y-10 pt-2">
                    {filteredExams.map((exam, index) => {
                        const hasVideos = exam.videos.some(v => v.url && v.url.trim() !== '');
                        const completedVideos = exam.videos.filter(v => v.url && v.url.trim() !== '').length;
                        
                        const badgeColors = ['bg-[#9C27B0]', 'bg-[#FF2E63]', 'bg-[#FF9800]', 'bg-[#2196F3]'];
                        const currentBadgeColor = badgeColors[index % badgeColors.length];

                        return (
                        <div key={exam.id} className="relative pt-3 pl-3">
                            {/* Number Badge */}
                            <div className={`absolute top-0 left-0 w-9 h-9 ${currentBadgeColor} text-white rounded-full flex items-center justify-center font-black text-sm shadow-lg z-10 border-[3px] border-white`}>
                                {exam.order}
                            </div>

                            <div 
                                onClick={() => setSelectedExam(exam)}
                                className="group bg-white rounded-2xl border border-slate-200 shadow-sm hover:shadow-2xl hover:shadow-purple-500/10 hover:border-purple-300 transition-all cursor-pointer flex flex-col h-full relative overflow-hidden"
                            >
                            <div className="p-6 flex-1 flex flex-col">
                                <div className="flex justify-between items-start mb-5">
                                    <span className={`px-2.5 py-1 text-[10px] font-black rounded uppercase tracking-wider ${
                                        exam.type === 'GK2' ? 'bg-indigo-50 text-indigo-600' : 'bg-purple-50 text-purple-600'
                                    }`}>
                                        {exam.type === 'GK2' ? 'Giữa Kỳ 2' : 'Cuối Kỳ 2'}
                                    </span>
                                </div>
                                
                                <h3 className="text-xl font-extrabold text-slate-800 mb-3 group-hover:text-purple-600 transition-colors line-clamp-2">
                                    {exam.title}
                                </h3>
                                
                                <div className="mt-auto pt-5 flex items-center justify-between border-t border-slate-50">
                                    <div className="flex items-center gap-2">
                                        <div className={`p-1.5 rounded-lg transition-colors ${completedVideos > 0 ? 'bg-purple-50 text-purple-500' : 'bg-slate-50 text-slate-400'}`}>
                                            <IconVideo className="w-4 h-4" />
                                        </div>
                                        <span className="text-[13px] font-bold text-slate-600">{completedVideos}/3 Phần</span>
                                    </div>
                                    
                                    {completedVideos === 3 ? (
                                        <span className="text-[11px] font-bold text-emerald-600 bg-emerald-50 px-2 py-1 rounded-md flex items-center gap-1 border border-emerald-100">
                                            <IconCheckCircle className="w-3 h-3" /> Full
                                        </span>
                                    ) : (
                                        <span className="text-[11px] font-bold text-slate-400 uppercase tracking-wider">
                                            Đang cập nhật
                                        </span>
                                    )}
                                </div>
                            </div>
                            
                            <div className={`h-1.5 w-full transition-colors ${hasVideos ? 'bg-gradient-to-r from-[#FF2E63] to-purple-600' : 'bg-slate-100'}`} />
                            </div>
                        </div>
                        );
                    })}
                    </div>
                    
                    {filteredExams.length === 0 && (
                        <div className="text-center py-20 bg-white rounded-3xl border border-slate-200 border-dashed mt-8">
                            <div className="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-4">
                                <IconSearch className="w-8 h-8 text-slate-300" />
                            </div>
                            <h3 className="text-xl font-bold text-slate-700 mb-2">Không tìm thấy đề thi</h3>
                            <p className="text-slate-500 text-sm">Thử thay đổi bộ lọc hoặc từ khóa tìm kiếm khác.</p>
                        </div>
                    )}
                </main>

                {/* Exam Detail Modal (Read-Only) */}
                {selectedExam && (
                    <ExamModal 
                        exam={selectedExam} 
                        onClose={() => setSelectedExam(null)} 
                    />
                )}
                </div>
            );
        }

        // Component Modal xem chi tiết Đề thi (Bỏ tính năng Edit trong Modal)
        function ExamModal({ exam, onClose }) {
            const [activeTab, setActiveTab] = useState(0);
            const [isTheaterMode, setIsTheaterMode] = useState(false);

            useEffect(() => {
                setIsTheaterMode(false);
            }, [exam]);

            const currentVideo = exam.videos[activeTab];
            const ytId = getYouTubeId(currentVideo.url);

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-2 sm:p-4 md:p-6 bg-slate-900/80 backdrop-blur-md">
                    <div className={`bg-white rounded-[2rem] w-full ${isTheaterMode ? 'max-w-[1200px] h-[90vh]' : 'max-w-5xl max-h-[90vh]'} flex flex-col overflow-hidden shadow-2xl animate-in fade-in zoom-in-95 duration-300 transition-all`}>
                        
                        <div className="px-6 py-5 border-b border-slate-100 flex items-center justify-between bg-white relative z-10 shadow-sm">
                            <div>
                                <div className="flex items-center gap-3 mb-1">
                                    <span className={`px-2.5 py-0.5 text-[10px] font-black uppercase tracking-wider rounded border ${
                                        exam.type === 'GK2' ? 'bg-indigo-50 text-indigo-600 border-indigo-100' : 'bg-purple-50 text-purple-600 border-purple-100'
                                    }`}>
                                        {exam.type === 'GK2' ? 'Giữa Kỳ 2' : 'Cuối Kỳ 2'}
                                    </span>
                                    <span className="text-slate-400 text-sm font-bold">•</span>
                                    <span className="text-sm font-bold text-slate-500">Video số {exam.order}/26</span>
                                </div>
                                <h2 className="text-xl md:text-2xl font-black text-slate-800 tracking-tight">{exam.title}</h2>
                            </div>
                            <button onClick={onClose} className="p-2.5 bg-slate-50 hover:bg-rose-50 hover:text-rose-500 text-slate-500 rounded-full transition-colors">
                                <IconX className="w-5 h-5" />
                            </button>
                        </div>

                        <div className="flex-1 overflow-hidden bg-slate-50 flex flex-col md:flex-row relative">
                            
                            {!isTheaterMode && (
                                <div className="w-full md:w-72 bg-white border-r border-slate-100 p-5 flex flex-col gap-3 shrink-0 overflow-y-auto animate-in slide-in-from-left-4 duration-300">
                                    <div className="text-xs font-black text-slate-400 uppercase tracking-wider mb-2">Danh sách Video</div>
                                    
                                    {exam.videos.map((vid, idx) => {
                                        const hasLink = !!getYouTubeId(vid.url);
                                        return (
                                            <button
                                                key={idx}
                                                onClick={() => setActiveTab(idx)}
                                                className={`flex flex-col text-left p-3.5 rounded-2xl transition-all border-2 ${
                                                    activeTab === idx 
                                                        ? 'border-purple-500 bg-purple-50' 
                                                        : 'border-transparent hover:bg-slate-50'
                                                }`}
                                            >
                                                <span className={`font-black text-[15px] mb-1 ${activeTab === idx ? 'text-purple-600' : 'text-slate-700'}`}>
                                                    {vid.part}
                                                </span>
                                                <span className="text-xs text-slate-500 flex items-center justify-between font-medium">
                                                    {vid.title}
                                                    {hasLink ? <IconCheckCircle className="w-4 h-4 text-emerald-500 shrink-0 ml-2" /> : <div className="w-2 h-2 rounded-full bg-slate-300 shrink-0 ml-2" />}
                                                </span>
                                            </button>
                                        );
                                    })}
                                </div>
                            )}

                            <div className="flex-1 p-4 md:p-6 flex flex-col bg-slate-50/50 overflow-y-auto relative">
                                
                                <div className="flex items-center justify-between mb-4">
                                    <h3 className="text-lg md:text-xl font-black text-slate-800 flex items-center gap-3">
                                        <div className="p-2.5 bg-purple-100 rounded-xl shadow-sm border border-purple-200">
                                            <IconPlay className="w-5 h-5 text-purple-600" fill="currentColor"/>
                                        </div>
                                        <span>{currentVideo.part}: <span className="text-slate-600 font-bold">{currentVideo.title}</span></span>
                                    </h3>

                                    <button 
                                        onClick={() => setIsTheaterMode(!isTheaterMode)}
                                        className="flex items-center gap-2 px-3.5 py-2 bg-white hover:bg-purple-50 border border-slate-200 hover:border-purple-200 text-slate-600 hover:text-purple-600 rounded-xl text-sm font-bold transition-all shadow-sm"
                                    >
                                        {isTheaterMode ? (
                                            <><IconMinimize className="w-4 h-4" /> Thu nhỏ</>
                                        ) : (
                                            <><IconMaximize className="w-4 h-4" /> Phóng to</>
                                        )}
                                    </button>
                                </div>

                                <div className="flex-1 bg-black rounded-[2rem] overflow-hidden shadow-xl flex items-center justify-center relative aspect-video md:aspect-auto border border-slate-200">
                                    {ytId ? (
                                        <iframe
                                            src={`https://www.youtube.com/embed/${ytId}?rel=0&autoplay=0`}
                                            title="YouTube video player"
                                            frameBorder="0"
                                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                                            allowFullScreen
                                            className="absolute inset-0 w-full h-full"
                                        ></iframe>
                                    ) : (
                                        <div className="text-center p-8 md:p-12 w-full max-w-sm">
                                            <div className="w-20 h-20 bg-white/5 rounded-3xl flex items-center justify-center mx-auto mb-6 backdrop-blur-sm border border-white/10">
                                                <IconVideo className="w-10 h-10 text-white/40" />
                                            </div>
                                            <h4 className="text-white font-black text-xl mb-3">Chưa có Video</h4>
                                            <p className="text-white/50 text-sm leading-relaxed font-medium">
                                                Video bài giảng cho phần này đang được biên tập và sẽ cập nhật sớm nhất.
                                            </p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- COMPONENT THÔNG BÁO CHƯA CÀI ĐẶT GOOGLE SHEETS ---
        function GoogleSheetSetupWarning() {
            return (
                <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-6 font-sans text-slate-800">
                    <div className="bg-white p-8 md:p-10 rounded-3xl shadow-xl max-w-2xl w-full border border-slate-200">
                        <div className="w-16 h-16 bg-purple-100 text-purple-600 rounded-2xl flex items-center justify-center mb-6">
                            <IconFileSpreadsheet className="w-8 h-8" />
                        </div>
                        <h2 className="text-2xl md:text-3xl font-black text-slate-800 mb-3 tracking-tight">KẾT NỐI GOOGLE SHEETS</h2>
                        <p className="text-slate-600 mb-6 text-lg leading-relaxed">
                            Trang web của bạn đang hoạt động nhưng chưa có nguồn dữ liệu. Hãy làm theo 3 bước cực kỳ đơn giản sau để biến file Excel (Sheets) thành nơi lưu trữ link Video của bạn:
                        </p>
                        
                        <div className="space-y-4 mb-8">
                            <div className="flex gap-4 items-start p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                <div className="w-8 h-8 bg-blue-100 text-blue-600 font-bold rounded-full flex items-center justify-center shrink-0">1</div>
                                <div>
                                    <p className="font-bold text-slate-800">Tạo File Google Sheets</p>
                                    <p className="text-sm text-slate-500 mt-1">
                                        Tạo 1 file Google Sheets với 4 cột ở dòng đầu tiên: <br/> 
                                        <b>MaDe</b>, <b>Link_Phan1</b>, <b>Link_Phan2</b>, <b>Link_Phan3</b>.<br/>
                                        Từ dòng số 2 trở đi, cột MaDe điền từ 1 đến 26. Các cột link bỏ trống hoặc dán link YouTube vào.
                                    </p>
                                </div>
                            </div>
                            
                            <div className="flex gap-4 items-start p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                <div className="w-8 h-8 bg-blue-100 text-blue-600 font-bold rounded-full flex items-center justify-center shrink-0">2</div>
                                <div>
                                    <p className="font-bold text-slate-800">Công bố ra Web (Dạng CSV)</p>
                                    <p className="text-sm text-slate-500 mt-1">
                                        Trong Google Sheets, bấm menu <b>Tệp (File)</b> > <b>Chia sẻ (Share)</b> > <b>Công bố lên web (Publish to web)</b>.<br/>
                                        Chọn <b>Định dạng CSV</b> (dấu phẩy phân tách) thay vì Trang Web. Bấm Công bố và copy đường link xuất hiện.
                                    </p>
                                </div>
                            </div>

                            <div className="flex gap-4 items-start p-4 bg-rose-50 rounded-2xl border border-rose-100">
                                <div className="w-8 h-8 bg-rose-500 text-white font-bold rounded-full flex items-center justify-center shrink-0">3</div>
                                <div>
                                    <p className="font-bold text-rose-900">Dán Link vào Code</p>
                                    <p className="text-sm text-rose-700 mt-1">
                                        Mở file <code>index.html</code> này lên. Ở ngay dòng 26-27 có biến <code>PUBLISHED_CSV_URL</code>, dán link CSV bạn vừa copy vào trong dấu ngoặc kép. Lưu lại là xong!
                                    </p>
                                </div>
                            </div>
                        </div>

                        <div className="p-4 bg-indigo-50 text-indigo-700 rounded-xl text-sm font-semibold flex gap-2">
                            <span className="text-lg">💡</span> Khi bạn dán link xong, màn hình hướng dẫn này sẽ tự động mất đi và hiện ra danh sách 26 đề thi của bạn!
                        </div>
                    </div>
                </div>
            );
        }

        // Render ứng dụng
        const root = ReactDOM.createRoot(document.getElementById('root'));
        
        // Nếu chưa điền link CSV thì hiển thị Bảng hướng dẫn
        if (!PUBLISHED_CSV_URL) {
            root.render(<GoogleSheetSetupWarning />);
        } else {
            root.render(<App />);
        }
    </script>
</body>
</html>
