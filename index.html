<!DOCTYPE html>
<html lang="vi" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Video Giải Đề - Giáo Dục Tâm Đức</title>
    
    <!-- Cài đặt Tailwind CSS và cấu hình Dark Mode -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } }
        }
    </script>
    
    <!-- Cài đặt React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Cài đặt Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Tùy chỉnh thanh cuộn siêu mượt */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Hiệu ứng mượt mà cho Dark Mode */
        html.transition-colors * { transition-property: background-color, border-color, color, fill, stroke; transition-duration: 300ms; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-[#F8FAFC] dark:bg-slate-900 text-slate-800 dark:text-slate-100 font-sans pb-24 selection:bg-purple-200 selection:text-purple-900 transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, getDoc, updateDoc, addDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useMemo, useRef } = React;

        // ==========================================
        // CẤU HÌNH FIREBASE CỦA BẠN
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyD9CxZobvHbBbLmsOTgpheRBaM4WbilEUk",
            authDomain: "ntd688-4ed85.firebaseapp.com",
            projectId: "ntd688-4ed85",
            storageBucket: "ntd688-4ed85.firebasestorage.app",
            messagingSenderId: "471849948327",
            appId: "1:471849948327:web:4d1a9c3e466cc7837cb782",
            measurementId: "G-N8NB27794M"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const db = getFirestore(app);
        const appId = 'ntd-video-edu-app';

        // --- BỘ ICON SVG CHUẨN ---
        const IconGraduationCap = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>;
        const IconLogOut = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>;
        const IconLock = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
        const IconLayers = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>;
        const IconSearch = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
        const IconVideo = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2" ry="2"/></svg>;
        const IconCheckCircle = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
        const IconEdit3 = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>;
        const IconX = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
        const IconPlay = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
        const IconMaximize = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>;
        const IconMinimize = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/></svg>;
        const IconFire = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M15.366 3.438c.613.684.975 1.576 1.05 2.56.096 1.258-.337 2.454-.882 3.42-1.025 1.815-2.617 3.033-2.617 5.166 0 2.2 1.789 3.99 3.99 3.99 2.2 0 3.99-1.79 3.99-3.99 0-1.282-.603-2.433-1.54-3.178.618 1.055.826 2.247.534 3.337-.168.625-1.053.69-1.328.094-.28-.606-.723-1.127-1.29-1.542.428.892.49 1.936.143 2.872-.44 1.185-1.554 2.016-2.857 2.016-1.685 0-3.052-1.367-3.052-3.052 0-2.486 2.146-3.832 3.654-6.315.655-1.077 1.05-2.316.942-3.564-.047-.542.548-.887.97-.506zM8.11 8.875c.42.336.812.722 1.144 1.166.792 1.056 1.14 2.373 1.14 3.738 0 1.99-1.266 3.72-3.13 4.316-.39.124-.8.188-1.218.188-2.228 0-4.045-1.816-4.045-4.045 0-1.854 1.25-3.415 2.97-3.923.32-.095.534-.388.534-.72v-.037c0-.28-.152-.53-.404-.655-.66-.327-1.205-.85-1.564-1.503.774.834 1.838 1.34 2.986 1.34h.02c.39 0 .736-.264.83-.642.274-1.087.982-1.99 1.95-2.52.128.818-.216 1.666-.856 2.24l-.357.32z"/></svg>;
        const IconStar = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>;
        const IconMoon = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>;
        const IconSun = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>;
        const IconMessageCircle = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>;
        const IconEdit2 = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>;
        const IconTrophy = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>;

        // --- HELPERS ---
        const getYouTubeId = (url) => {
            if (!url) return null;
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        };

        const removeAccents = (str) => str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/đ/g, "d").replace(/Đ/g, "D");

        function App() {
            // Core States
            const [user, setUser] = useState(null);
            const [userProfile, setUserProfile] = useState({ points: 0, streak: 0, completedVideos: [] });
            const [exams, setExams] = useState([]);
            const [leaderboard, setLeaderboard] = useState([]);
            const [loading, setLoading] = useState(true);
            const [isDarkMode, setIsDarkMode] = useState(false);
            
            // UI States
            const [filter, setFilter] = useState('ALL');
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedExam, setSelectedExam] = useState(null);
            const [showLeaderboard, setShowLeaderboard] = useState(false);
            
            // Admin States
            const [isAdmin, setIsAdmin] = useState(false);

            // 1. Dark Mode Init
            useEffect(() => {
                const savedTheme = localStorage.getItem('theme');
                if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                    setIsDarkMode(true);
                    document.documentElement.classList.add('dark');
                } else {
                    // Mặc định ép sang sáng để đảm bảo hiệu ứng
                    document.documentElement.classList.remove('transition-colors');
                    setTimeout(() => document.documentElement.classList.add('transition-colors'), 50);
                }
            }, []);

            const toggleDarkMode = () => {
                if (isDarkMode) {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                } else {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                }
                setIsDarkMode(!isDarkMode);
            };

            // 2. Auth & Tải dữ liệu cá nhân
            useEffect(() => {
                const unsubscribe = onAuthStateChanged(auth, async (currentUser) => {
                    setUser(currentUser);
                    if (currentUser) {
                        // Tính toán Streak (Ngọn lửa)
                        const userRef = doc(db, 'artifacts', appId, 'users', currentUser.uid);
                        const docSnap = await getDoc(userRef);
                        
                        const today = new Date().toISOString().split('T')[0];
                        let newStreak = 1;
                        let currentPoints = 0;
                        let completed = [];

                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            currentPoints = data.points || 0;
                            completed = data.completedVideos || [];
                            const lastLogin = data.lastLoginDate;

                            if (lastLogin) {
                                const lastDate = new Date(lastLogin);
                                const currentDate = new Date(today);
                                const diffTime = Math.abs(currentDate - lastDate);
                                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
                                
                                if (diffDays === 1) newStreak = (data.streak || 0) + 1; // Học liên tiếp
                                else if (diffDays === 0) newStreak = data.streak || 1; // Đã vào trong ngày
                                else newStreak = 1; // Chuỗi bị đứt
                            }
                        }

                        // Cập nhật lên DB
                        await setDoc(userRef, {
                            displayName: currentUser.displayName || 'Học viên',
                            photoURL: currentUser.photoURL || '',
                            lastLoginDate: today,
                            streak: newStreak,
                            points: currentPoints,
                            completedVideos: completed
                        }, { merge: true });

                        setUserProfile({ points: currentPoints, streak: newStreak, completedVideos: completed });
                    }
                });
                return () => unsubscribe();
            }, []);

            // Theo dõi Realtime Profile người dùng (để cập nhật điểm liền)
            useEffect(() => {
                if (!user) return;
                const userRef = doc(db, 'artifacts', appId, 'users', user.uid);
                const unsub = onSnapshot(userRef, (doc) => {
                    if (doc.exists()) {
                        const d = doc.data();
                        setUserProfile(prev => ({...prev, points: d.points || 0, completedVideos: d.completedVideos || []}));
                    }
                });
                return () => unsub();
            }, [user]);

            // 3. Lấy dữ liệu 26 Đề thi
            useEffect(() => {
                const examsRef = collection(db, 'artifacts', appId, 'public', 'data', 'exams_v4');
                const unsubscribe = onSnapshot(examsRef, async (snapshot) => {
                    if (snapshot.empty) {
                        // Khởi tạo data lần đầu nếu trống
                        for (let i = 1; i <= 26; i++) {
                            const type = i <= 10 ? 'GK2' : 'CK2';
                            const examId = `exam_v4_${i.toString().padStart(2, '0')}`;
                            await setDoc(doc(examsRef, examId), {
                                id: examId, title: `Đề thi số ${i}`, type: type, order: i,
                                videos: [{ part: 'Phần 1', title: 'Trắc nghiệm', url: '' }, { part: 'Phần 2', title: 'Đúng sai', url: '' }, { part: 'Phần 3', title: 'Trả lời ngắn', url: '' }]
                            });
                        }
                    } else {
                        const fetchedExams = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })).sort((a, b) => a.order - b.order);
                        setExams(fetchedExams);
                        setLoading(false);
                    }
                });
                return () => unsubscribe();
            }, []);

            // 4. Lấy dữ liệu Bảng Xếp Hạng
            useEffect(() => {
                const usersRef = collection(db, 'artifacts', appId, 'users');
                const q = query(usersRef, orderBy('points', 'desc')); // Firebase tự lo, ta lấy tất cả rồi limit bằng JS cho an toàn không lỗi Index
                const unsub = onSnapshot(q, (snapshot) => {
                    const topUsers = [];
                    snapshot.forEach(doc => topUsers.push({ id: doc.id, ...doc.data() }));
                    setLeaderboard(topUsers.slice(0, 10)); // Top 10
                });
                return () => unsub();
            }, []);

            // Chức năng Login/Logout Google
            const loginGoogle = async () => {
                try { await signInWithPopup(auth, provider); } 
                catch (error) { console.error("Lỗi đăng nhập:", error); alert("Có lỗi xảy ra khi đăng nhập Google!"); }
            };
            const logout = () => { signOut(auth); setUser(null); setIsAdmin(false); };

            // Tìm kiếm
            const filteredExams = useMemo(() => {
                return exams.filter(exam => {
                    const matchType = filter === 'ALL' || exam.type === filter;
                    const normalizedSearch = removeAccents(searchQuery.toLowerCase().trim());
                    const searchTerms = normalizedSearch.split(/\s+/).filter(Boolean);
                    if (searchTerms.length === 0) return matchType;
                    const normalizedTitle = removeAccents(exam.title.toLowerCase());
                    const matchesAllTerms = searchTerms.every(term => {
                        if (!isNaN(term)) return new RegExp(`\\b${term}\\b`).test(normalizedTitle) || exam.order.toString() === term;
                        return normalizedTitle.includes(term);
                    });
                    return matchType && matchesAllTerms;
                });
            }, [exams, filter, searchQuery]);

            if (loading) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-[#F8FAFC] dark:bg-slate-900">
                        <div className="w-12 h-12 border-4 border-purple-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                        <p className="text-slate-600 dark:text-slate-400 font-medium">Đang đồng bộ dữ liệu siêu cấp...</p>
                    </div>
                );
            }

            return (
                <div className="font-sans min-h-screen">
                    {/* --- HEADER --- */}
                    <header className="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md shadow-sm sticky top-0 z-30 border-b border-slate-200 dark:border-slate-800">
                        <div className="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="bg-gradient-to-br from-[#FF2E63] to-purple-600 p-2 rounded-xl shadow-lg shadow-purple-500/30">
                                    <IconGraduationCap className="w-6 h-6 text-white" />
                                </div>
                                <div>
                                    <h1 className="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-[#FF2E63] to-purple-600 uppercase tracking-tight hidden sm:block">Giáo Dục Tâm Đức</h1>
                                    <h1 className="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-[#FF2E63] to-purple-600 uppercase tracking-tight sm:hidden">Tâm Đức</h1>
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-2 sm:gap-4">
                                {/* Dark mode toggle */}
                                <button onClick={toggleDarkMode} className="p-2.5 rounded-full text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                                    {isDarkMode ? <IconSun className="w-5 h-5"/> : <IconMoon className="w-5 h-5"/>}
                                </button>
                                
                                {user ? (
                                    <div className="flex items-center gap-3">
                                        {/* Gamification Stats */}
                                        <div className="hidden sm:flex items-center gap-3 px-4 py-1.5 bg-slate-100 dark:bg-slate-800 rounded-full border border-slate-200 dark:border-slate-700">
                                            <div className="flex items-center gap-1 font-bold text-orange-500"><IconFire className="w-5 h-5"/> {userProfile.streak}</div>
                                            <div className="w-px h-4 bg-slate-300 dark:bg-slate-600"></div>
                                            <div className="flex items-center gap-1 font-bold text-yellow-500"><IconStar className="w-5 h-5"/> {userProfile.points}</div>
                                        </div>
                                        
                                        {/* Profile Dropdown (Simplified as click to logout for now) */}
                                        <div className="group relative cursor-pointer flex items-center gap-2" onClick={logout} title="Đăng xuất">
                                            <img src={user.photoURL || `https://ui-avatars.com/api/?name=${user.displayName}&background=random`} alt="Avatar" className="w-9 h-9 rounded-full ring-2 ring-purple-500" />
                                            <div className="hidden md:block text-sm font-bold text-slate-700 dark:text-slate-200">
                                                {user.displayName?.split(' ')[0]} <IconLogOut className="w-3 h-3 inline ml-1 opacity-50"/>
                                            </div>
                                        </div>
                                    </div>
                                ) : (
                                    <button onClick={loginGoogle} className="flex items-center gap-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-700 px-5 py-2.5 rounded-full text-sm font-bold transition-all shadow-sm">

                                    <div onClick={() => { if(!user) { alert("Vui lòng Đăng nhập bằng Google để vào học!"); loginGoogle(); } else setSelectedExam(exam); }} className="group bg-white dark:bg-slate-800 rounded-[1.5rem] border border-slate-200 dark:border-slate-700 shadow-sm hover:shadow-xl hover:shadow-purple-500/10 hover:border-purple-300 dark:hover:border-purple-500 transition-all cursor-pointer flex flex-col h-full relative overflow-hidden">

                                            {/* Progress Bar Cá Nhân */}
                                            <div className="mt-auto">
                                                <div className="flex justify-between text-xs font-bold text-slate-500 dark:text-slate-400 mb-2">
                                                    <span>{availableVideosCount === 0 ? 'Chưa có bài giảng' : `Đã học ${completedInThisExam}/${availableVideosCount} phần`}</span>
                                                    {progressPercent === 100 && availableVideosCount > 0 && <span className="text-emerald-500 flex items-center gap-1"><IconCheckCircle className="w-3 h-3"/> Hoàn thành</span>}
                                                </div>
                                                <div className="w-full bg-slate-100 dark:bg-slate-700 rounded-full h-2.5 overflow-hidden">
                                                    <div className={`h-full rounded-full transition-all duration-1000 ${progressPercent === 100 ? 'bg-emerald-500' : 'bg-gradient-to-r from-[#FF2E63] to-purple-600'}`} style={{ width: `${progressPercent}%` }}></div>

                                            </div>

                    </div>

                    {/* --- MODAL LEADERBOARD --- */}

                                <button onClick={() => setShowLeaderboard(false)} className="absolute top-6 right-6 text-slate-400 hover:text-slate-800 dark:hover:text-white"><IconX className="w-6 h-6" /></button>
                                <div className="text-center mb-6">
                                    <div className="w-16 h-16 bg-yellow-100 dark:bg-yellow-900/30 text-yellow-600 dark:text-yellow-400 rounded-2xl flex items-center justify-center mx-auto mb-4"><IconTrophy className="w-8 h-8"/></div>
                                    <h3 className="text-2xl font-black text-slate-800 dark:text-white uppercase tracking-tight">Bảng Vàng Thành Tích</h3>
                                    <p className="text-slate-500 dark:text-slate-400 text-sm mt-1">Top 10 Chiến thần học tập xuất sắc nhất</p>
                                </div>
                                <div className="space-y-3 max-h-[50vh] overflow-y-auto pr-2">
                                    {leaderboard.length === 0 ? <p className="text-center text-slate-500 py-4">Chưa có ai ghi danh...</p> : leaderboard.map((u, idx) => (
                                        <div key={u.id} className={`flex items-center gap-4 p-3 rounded-2xl border ${idx===0 ? 'bg-yellow-50 dark:bg-yellow-900/10 border-yellow-200 dark:border-yellow-700/50' : idx===1 ? 'bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700' : idx===2 ? 'bg-orange-50 dark:bg-orange-900/10 border-orange-200 dark:border-orange-700/50' : 'bg-white dark:bg-slate-800/50 border-transparent'}`}>
                                            <div className={`w-8 font-black text-center ${idx===0 ? 'text-yellow-500 text-xl' : idx===1 ? 'text-slate-400 text-lg' : idx===2 ? 'text-orange-400 text-lg' : 'text-slate-300 dark:text-slate-600'}`}>#{idx+1}</div>
                                            <img src={u.photoURL || `https://ui-avatars.com/api/?name=${u.displayName}`} className="w-10 h-10 rounded-full border-2 border-white dark:border-slate-700 shadow-sm"/>
                                            <div className="flex-1 min-w-0">
                                                <p className="font-bold text-slate-800 dark:text-slate-200 truncate">{u.displayName}</p>
                                                <p className="text-xs text-slate-500 dark:text-slate-400 flex items-center gap-1"><IconFire className="w-3 h-3 text-orange-400"/> {u.streak} ngày</p>
                                            </div>

                                        </div>

                        </div>
                    )}

                    {/* --- EXAM MODAL (XEM VIDEO & GHI CHÚ) --- */}
                    {selectedExam && (
                        <ExamModal 
                            exam={selectedExam} 
                            user={user}
                            userProfile={userProfile}
                            isAdmin={isAdmin}
                            onClose={() => setSelectedExam(null)} 
                            db={db} appId={appId}
                        />
                    )}
                </div>
            );
        }

        // --- COMPONENT MODAL XEM CHI TIẾT ĐỀ THI ---
        function ExamModal({ exam, user, userProfile, isAdmin, onClose, db, appId }) {
            const [activeTab, setActiveTab] = useState(0); // 0, 1, 2 tương ứng phần 1, 2, 3
            const [editMode, setEditMode] = useState(false);
            const [formData, setFormData] = useState([...exam.videos]);
            const [isSaving, setIsSaving] = useState(false);
            const [isTheaterMode, setIsTheaterMode] = useState(false);
            const [noteContent, setNoteContent] = useState('');
            const [isSavingNote, setIsSavingNote] = useState(false);
            const [comments, setComments] = useState([]);
            const [newComment, setNewComment] = useState('');

            const examPartId = `${exam.id}_${activeTab}`;
            const isCompleted = userProfile.completedVideos.includes(examPartId);

            useEffect(() => {
                setFormData([...exam.videos]); setEditMode(false); setIsTheaterMode(false);
            }, [exam]);

            // Lấy Ghi chú cá nhân & Bình luận khi chuyển tab/đề
            useEffect(() => {
                if(!user) return;
                // Fetch Notes
                const fetchNote = async () => {
                    const noteDoc = await getDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'notes', examPartId));
                    if(noteDoc.exists()) setNoteContent(noteDoc.data().text || '');
                    else setNoteContent('');
                };
                fetchNote();

                // Fetch Comments Realtime
                const commentsRef = collection(db, 'artifacts', appId, 'public', 'comments', examPartId, 'messages');
                const q = query(commentsRef, orderBy('createdAt', 'desc'));
                const unsub = onSnapshot(q, (snapshot) => {
                    setComments(snapshot.docs.map(d => ({id: d.id, ...d.data()})));
                });
                return () => unsub();
            }, [examPartId, user]);

            const handleMarkCompleted = async () => {
                if (isCompleted) return; // Đã đánh dấu rồi
                const userRef = doc(db, 'artifacts', appId, 'users', user.uid);
                await updateDoc(userRef, {
                    completedVideos: [...userProfile.completedVideos, examPartId],
                    points: userProfile.points + 10 // CỘNG ĐIỂM
                });
                // Note: userProfile tự động update qua Realtime Listener ở App
            };

            const handleSaveNote = async () => {
                setIsSavingNote(true);
                await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'notes', examPartId), { text: noteContent, updatedAt: serverTimestamp() });
                setTimeout(() => setIsSavingNote(false), 500); // Giả lập loading nhẹ cho mượt
            };

            const handlePostComment = async (e) => {
                e.preventDefault();
                if(!newComment.trim()) return;
                const commentsRef = collection(db, 'artifacts', appId, 'public', 'comments', examPartId, 'messages');
                await addDoc(commentsRef, {
                    text: newComment,
                    userName: user.displayName,
                    userPhoto: user.photoURL,
                    userId: user.uid,
                    createdAt: serverTimestamp()
                });
                setNewComment('');
            };

            // Admin Save Links
            const handleSaveLinks = async () => {
                setIsSaving(true);
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'exams_v4', exam.id), { videos: formData, updatedAt: new Date().toISOString() });
                setEditMode(false); setIsSaving(false);
            };

            const currentVideo = editMode ? formData[activeTab] : exam.videos[activeTab];
            const ytId = getYouTubeId(currentVideo.url);

            return (
                <div className="fixed inset-0 z-50 flex items-end md:items-center justify-center sm:p-4 bg-slate-900/90 backdrop-blur-md transition-all">
                    <div className={`bg-white dark:bg-slate-900 w-full ${isTheaterMode ? 'md:max-w-[1500px]' : 'md:w-[90vw] md:max-w-7xl'} h-[95vh] md:h-[90vh] rounded-t-3xl md:rounded-[2rem] flex flex-col overflow-hidden shadow-2xl border border-slate-200 dark:border-slate-800 animate-in fade-in zoom-in-95 duration-300`}>
                        
                        {/* Header Modal */}
                        <div className="px-5 md:px-8 py-4 border-b border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900 flex justify-between items-center z-20 shrink-0">
                            <div>
                                <div className="flex items-center gap-2 mb-1">
                                    <span className="bg-purple-100 dark:bg-purple-900/30 text-purple-700 dark:text-purple-400 px-2 py-0.5 rounded text-[10px] font-black uppercase">Đề {exam.order}/26</span>
                                </div>
                                <h2 className="text-xl font-black text-slate-800 dark:text-slate-100">{exam.title}</h2>
                            </div>
                            <button onClick={onClose} className="p-2.5 bg-slate-100 dark:bg-slate-800 hover:bg-rose-100 text-slate-500 rounded-full"><IconX className="w-5 h-5" /></button>
                        </div>

                        {/* Content Split */}
                        <div className="flex-1 overflow-hidden flex flex-col md:flex-row relative bg-slate-50 dark:bg-slate-950">
                            
                            {/* Cột Trái (Sidebar Navigation) */}
                            {!isTheaterMode && (
                                <div className="w-full md:w-80 bg-white dark:bg-slate-900 border-r border-slate-100 dark:border-slate-800 p-4 flex flex-col shrink-0 overflow-y-auto order-2 md:order-1 z-10">
                                    <div className="text-xs font-black text-slate-400 uppercase tracking-wider mb-4">Danh mục bài giảng</div>
                                    <div className="flex flex-col gap-3">
                                        {formData.map((vid, idx) => {
                                            const hasLink = !!getYouTubeId(vid.url);
                                            const isDone = userProfile.completedVideos.includes(`${exam.id}_${idx}`);
                                            return (
                                                <button key={idx} onClick={() => setActiveTab(idx)} className={`flex flex-col text-left p-4 rounded-2xl transition-all border-2 ${activeTab === idx ? 'border-purple-500 bg-purple-50 dark:bg-purple-900/20' : 'border-transparent bg-slate-50 dark:bg-slate-800 hover:bg-slate-100 dark:hover:bg-slate-700'}`}>
                                                    <span className={`font-black text-base mb-1 ${activeTab === idx ? 'text-purple-600 dark:text-purple-400' : 'text-slate-700 dark:text-slate-200'}`}>{vid.part}</span>
                                                    <span className="text-sm text-slate-500 dark:text-slate-400 flex items-center justify-between font-medium w-full">
                                                        <span className="truncate pr-2">{vid.title}</span>
                                                        {isDone ? <IconCheckCircle className="w-5 h-5 text-emerald-500 shrink-0" /> : (!hasLink && <div className="w-2 h-2 rounded-full bg-slate-300 dark:bg-slate-600 shrink-0"/>)}
                                                    </span>
                                                </button>
                                            );
                                        })}
                                    </div>

                                    {/* Khung Admin */}
                                    {isAdmin && (
                                        <div className="mt-auto pt-6 border-t border-slate-100 dark:border-slate-800">
                                            {!editMode ? (
                                                <button onClick={() => setEditMode(true)} className="w-full flex justify-center gap-2 py-3 bg-slate-800 text-white rounded-xl text-sm font-bold shadow-md"><IconEdit3 className="w-4 h-4" /> Bật sửa Link</button>
                                            ) : (
                                                <div className="flex flex-col gap-2 p-3 bg-amber-50 dark:bg-amber-900/20 rounded-2xl border border-amber-100 dark:border-amber-900/50">
                                                    <button onClick={handleSaveLinks} disabled={isSaving} className="w-full py-3 bg-emerald-500 text-white rounded-xl text-sm font-bold shadow-md">Lưu Tất Cả</button>
                                                    <button onClick={() => {setFormData([...exam.videos]); setEditMode(false);}} className="w-full py-2 text-slate-600 dark:text-slate-400 font-bold">Hủy</button>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* Cột Phải (Video + Gamification Tương tác) */}
                            <div className="flex-1 flex flex-col overflow-y-auto order-1 md:order-2">
                                
                                {/* Header Video */}
                                <div className="p-4 md:p-6 pb-0 flex justify-between items-center gap-4 bg-slate-50 dark:bg-slate-950">
                                    <h3 className="text-xl md:text-2xl font-black text-slate-800 dark:text-slate-100 flex items-center gap-3">
                                        <div className="p-2 bg-purple-100 dark:bg-purple-900/50 rounded-lg"><IconPlay className="w-5 h-5 text-purple-600 dark:text-purple-400" fill="currentColor"/></div>
                                        {currentVideo.part}
                                    </h3>
                                    {!editMode && (
                                        <button onClick={() => setIsTheaterMode(!isTheaterMode)} className="flex items-center gap-2 px-4 py-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-sm font-bold shadow-sm">
                                            {isTheaterMode ? <><IconMinimize className="w-4 h-4" /> <span className="hidden sm:inline">Thu nhỏ</span></> : <><IconMaximize className="w-4 h-4" /> <span className="hidden sm:inline">Phóng to</span></>}
                                        </button>
                                    )}
                                </div>

                                {/* KHU VỰC CHÍNH (Video Player / Edit) */}
                                <div className="p-4 md:p-6 w-full max-w-6xl mx-auto flex flex-col gap-6">
                                    
                                    {/* Video Container 16:9 */}
                                    <div className="w-full bg-black rounded-2xl md:rounded-[2rem] overflow-hidden shadow-2xl relative aspect-video border border-slate-200 dark:border-slate-800">
                                        {editMode ? (
                                            <div className="absolute inset-0 bg-white dark:bg-slate-900 p-8 flex flex-col justify-center">
                                                <label className="block text-sm font-black mb-2">Đường dẫn YouTube URL (Cho {currentVideo.part})</label>
                                                <input type="text" value={currentVideo.url} onChange={(e) => handleUrlChange(activeTab, e.target.value)} className="w-full border-2 border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 rounded-2xl px-5 py-4 outline-none font-medium text-slate-800 dark:text-white mb-4" placeholder="Dán link vào đây..." />
                                                {ytId ? <p className="text-emerald-500 font-bold flex items-center gap-2"><IconCheckCircle className="w-5 h-5"/> Nhận diện thành công ID: {ytId}</p> : (currentVideo.url && <p className="text-rose-500 font-bold">Link không hợp lệ!</p>)}
                                            </div>
                                        ) : (
                                            ytId ? (
                                                <iframe src={`https://www.youtube.com/embed/${ytId}?rel=0`} className="absolute inset-0 w-full h-full" frameBorder="0" allowFullScreen></iframe>
                                            ) : (
                                                <div className="absolute inset-0 flex flex-col items-center justify-center p-8 text-center bg-slate-900">
                                                    <div className="w-20 h-20 bg-white/5 rounded-full flex items-center justify-center mb-4"><IconVideo className="w-10 h-10 text-white/30" /></div>
                                                    <h4 className="text-white font-black text-xl mb-2">Video Đang Biên Tập</h4>
                                                    <p className="text-white/50 text-sm">Bài giảng sẽ sớm được cập nhật lên hệ thống.</p>
                                                </div>
                                            )
                                        )}
                                    </div>

                                    {/* Action Bar (Hoàn thành) */}
                                    {!editMode && ytId && (
                                        <div className="flex flex-col sm:flex-row justify-between items-center gap-4 bg-white dark:bg-slate-800 p-4 md:p-6 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700">
                                            <div>
                                                <h4 className="font-bold text-slate-800 dark:text-slate-100 text-lg">Bạn đã hiểu bài chưa?</h4>
                                                <p className="text-sm text-slate-500 dark:text-slate-400">Đánh dấu hoàn thành để tích +10 điểm thưởng!</p>
                                            </div>
                                            <button 
                                                onClick={handleMarkCompleted}
                                                disabled={isCompleted}
                                                className={`flex items-center gap-2 px-8 py-3.5 rounded-xl font-black text-base transition-all ${
                                                    isCompleted 
                                                    ? 'bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 cursor-not-allowed' 
                                                    : 'bg-gradient-to-r from-emerald-400 to-teal-500 hover:scale-105 text-white shadow-lg shadow-emerald-500/30'
                                                }`}
                                            >
                                                {isCompleted ? <><IconCheckCircle className="w-5 h-5"/> Đã Hoàn Thành</> : <><IconStar className="w-5 h-5"/> Nhận 10 Điểm</>}
                                            </button>
                                        </div>
                                    )}

                                    {/* Tabs Tương tác: Ghi chú & Hỏi đáp */}
                                    {!editMode && ytId && (
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-4">
                                            {/* Smart Notes */}
                                            <div className="bg-white dark:bg-slate-800 rounded-2xl p-5 border border-slate-200 dark:border-slate-700 shadow-sm flex flex-col h-80">
                                                <div className="flex items-center justify-between mb-4">
                                                    <h4 className="font-black flex items-center gap-2 text-slate-800 dark:text-slate-100"><IconEdit2 className="w-5 h-5 text-blue-500"/> Ghi chú cá nhân</h4>
                                                    <button onClick={handleSaveNote} className="text-xs font-bold bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 px-3 py-1.5 rounded-lg hover:bg-blue-100 transition-colors">
                                                        {isSavingNote ? 'Đã lưu ✓' : 'Lưu lại'}
                                                    </button>
                                                </div>
                                                <textarea 
                                                    value={noteContent}
                                                    onChange={(e) => setNoteContent(e.target.value)}
                                                    onBlur={handleSaveNote}
                                                    placeholder="Gõ nhanh công thức, mẹo giải bài vào đây... (Tự động lưu)"
                                                    className="flex-1 w-full resize-none bg-yellow-50 dark:bg-yellow-900/10 border-none outline-none rounded-xl p-4 text-sm font-medium text-slate-700 dark:text-slate-300 placeholder:text-slate-400 dark:placeholder:text-slate-600"
                                                ></textarea>
                                            </div>

                                            {/* Q&A Comments */}
                                            <div className="bg-white dark:bg-slate-800 rounded-2xl p-5 border border-slate-200 dark:border-slate-700 shadow-sm flex flex-col h-80">
                                                <h4 className="font-black flex items-center gap-2 text-slate-800 dark:text-slate-100 mb-4"><IconMessageCircle className="w-5 h-5 text-purple-500"/> Thảo luận (Hỏi đáp)</h4>
                                                
                                                <div className="flex-1 overflow-y-auto mb-4 space-y-4 pr-2">
                                                    {comments.length === 0 ? (
                                                        <p className="text-center text-slate-400 text-sm mt-10">Chưa có bình luận nào. Hãy là người đầu tiên đặt câu hỏi!</p>
                                                    ) : (
                                                        comments.map(cmt => (
                                                            <div key={cmt.id} className="flex gap-3">
                                                                <img src={cmt.userPhoto || `https://ui-avatars.com/api/?name=${cmt.userName}`} className="w-8 h-8 rounded-full shrink-0 mt-1"/>
                                                                <div className="bg-slate-50 dark:bg-slate-700/50 p-3 rounded-2xl rounded-tl-none">
                                                                    <p className="text-xs font-bold text-slate-800 dark:text-slate-200 mb-1">{cmt.userName}</p>
                                                                    <p className="text-sm text-slate-600 dark:text-slate-300">{cmt.text}</p>
                                                                </div>
                                                            </div>
                                                        ))
                                                    )}
                                                </div>

                                                <form onSubmit={handlePostComment} className="flex gap-2">
                                                    <input 
                                                        type="text" 
                                                        value={newComment}
                                                        onChange={(e) => setNewComment(e.target.value)}
                                                        placeholder="Bạn có câu hỏi gì không?" 
                                                        className="flex-1 bg-slate-100 dark:bg-slate-700 border-none outline-none rounded-full px-4 py-2 text-sm text-slate-800 dark:text-slate-100"
                                                    />
                                                    <button type="submit" className="bg-purple-600 hover:bg-purple-700 text-white w-10 h-10 rounded-full flex items-center justify-center shrink-0 transition-colors">
                                                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                                                    </button>
                                                </form>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
